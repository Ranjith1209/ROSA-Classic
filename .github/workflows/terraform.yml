name: Terraform

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - gmax-nonprod
          - gmax-val
          - gmax-prod
      mode:
        description: "Operation mode"
        required: true
        type: choice
        options:
          - apply
          - destroy

env:
  TF_VERSION: ${{ vars.TF_VERSION || '1.6.6' }}

# ── Flow ───────────────────────────────────────────────────────────────────────
#
#   apply mode:   Plan → ⏸ Approve → Apply
#   destroy mode: Plan (with pre-flight fixes) → ⏸ Approve → Destroy
#
#   Both modes use a saved plan artifact so exactly what was reviewed
#   is what gets executed. State cannot change between plan and execute
#   because both jobs run in the same workflow run.
#
# ──────────────────────────────────────────────────────────────────────────────

jobs:
  # ── Job 1: Plan ──────────────────────────────────────────────────────────────
  plan:
    name: "Plan [${{ github.event.inputs.environment }}] [${{ github.event.inputs.mode }}]"
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      RHCS_TOKEN:            ${{ secrets.TF_VAR_RHCS_TOKEN }}
      TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE || 'rosa-terraform-lock' }}
      TF_STATE_KEY:  "rosa/${{ github.event.inputs.environment }}/terraform.tfstate"

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Resolve backend config
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          VAR_FILE="${{ github.event.inputs.environment }}.tfvars"
          REGION=$(grep -E '^aws_region\s*=' "$VAR_FILE" | sed -E 's/.*=\s*"([^"]+)".*/\1/')
          REGION="${REGION:-${{ vars.AWS_DEFAULT_REGION || 'us-west-1' }}}"
          BUCKET="rosa-terraform-state-${ACCOUNT_ID}"
          echo "STATE_BUCKET=$BUCKET" >> "$GITHUB_ENV"
          echo "STATE_REGION=$REGION" >> "$GITHUB_ENV"
          echo "Bucket : $BUCKET"
          echo "Region : $REGION"

      # Apply mode: create bucket if first run
      # Destroy mode: bucket must already exist (created during apply)
      - name: Bootstrap S3 state bucket
        if: github.event.inputs.mode == 'apply'
        run: |
          if aws s3api head-bucket --bucket "$STATE_BUCKET" 2>/dev/null; then
            echo "Bucket already exists: $STATE_BUCKET"
          else
            echo "Creating bucket: $STATE_BUCKET in $STATE_REGION"
            if [ "$STATE_REGION" = "us-east-1" ]; then
              aws s3api create-bucket \
                --bucket "$STATE_BUCKET" \
                --region "$STATE_REGION"
            else
              aws s3api create-bucket \
                --bucket "$STATE_BUCKET" \
                --region "$STATE_REGION" \
                --create-bucket-configuration LocationConstraint="$STATE_REGION"
            fi
            aws s3api put-bucket-versioning \
              --bucket "$STATE_BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "$STATE_BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block \
              --bucket "$STATE_BUCKET" \
              --public-access-block-configuration \
              'BlockPublicAcls=true,BlockPublicPolicy=true,IgnorePublicAcls=true,RestrictPublicBuckets=true'
            echo "Bucket created and configured."
          fi

      # Both modes: recreate DynamoDB if a previous failed destroy deleted it
      - name: Bootstrap DynamoDB lock table
        run: |
          if aws dynamodb describe-table \
               --table-name "$TF_LOCK_TABLE" \
               --region "$STATE_REGION" 2>/dev/null; then
            echo "DynamoDB table already exists."
          else
            echo "Creating DynamoDB table: $TF_LOCK_TABLE"
            aws dynamodb create-table \
              --table-name  "$TF_LOCK_TABLE" \
              --region      "$STATE_REGION" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema           AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST
            aws dynamodb wait table-exists \
              --table-name "$TF_LOCK_TABLE" \
              --region     "$STATE_REGION"
            echo "DynamoDB table created."
          fi

      # ── Destroy pre-flight fixes ────────────────────────────────────────────

      - name: "FIX 1: Remove prevent_destroy from backend.tf"
        if: github.event.inputs.mode == 'destroy'
        run: |
          sed -i '/prevent_destroy/d' backend.tf
          echo "prevent_destroy removed."

      - name: "FIX 2: Restore tfstate from S3 versioning if deleted"
        if: github.event.inputs.mode == 'destroy'
        run: |
          echo "Checking if tfstate exists: s3://$STATE_BUCKET/$TF_STATE_KEY"
          if aws s3 ls "s3://$STATE_BUCKET/$TF_STATE_KEY" --region "$STATE_REGION" 2>/dev/null; then
            echo "tfstate exists — no restore needed."
          else
            echo "tfstate not found — attempting restore from S3 versioning..."
            DELETE_MARKER_ID=$(aws s3api list-object-versions \
              --bucket "$STATE_BUCKET" --region "$STATE_REGION" \
              --prefix "$TF_STATE_KEY" \
              --query "DeleteMarkers[?Key=='$TF_STATE_KEY'] | sort_by(@, &LastModified) | [-1].VersionId" \
              --output text 2>/dev/null)
            if [ -n "$DELETE_MARKER_ID" ] && [ "$DELETE_MARKER_ID" != "None" ] && [ "$DELETE_MARKER_ID" != "null" ]; then
              echo "Removing delete marker: $DELETE_MARKER_ID"
              aws s3api delete-object \
                --bucket "$STATE_BUCKET" --key "$TF_STATE_KEY" \
                --version-id "$DELETE_MARKER_ID" --region "$STATE_REGION"
              echo "tfstate restored."
            else
              LATEST_VERSION=$(aws s3api list-object-versions \
                --bucket "$STATE_BUCKET" --region "$STATE_REGION" \
                --prefix "$TF_STATE_KEY" \
                --query "Versions[?Key=='$TF_STATE_KEY'] | sort_by(@, &LastModified) | [-1].VersionId" \
                --output text 2>/dev/null)
              if [ -n "$LATEST_VERSION" ] && [ "$LATEST_VERSION" != "None" ] && [ "$LATEST_VERSION" != "null" ]; then
                aws s3api copy-object \
                  --bucket "$STATE_BUCKET" \
                  --copy-source "$STATE_BUCKET/$TF_STATE_KEY?versionId=$LATEST_VERSION" \
                  --key "$TF_STATE_KEY" --region "$STATE_REGION"
                echo "tfstate restored from version: $LATEST_VERSION"
              else
                echo "ERROR: tfstate permanently deleted. Destroy manually from AWS Console."
                exit 1
              fi
            fi
          fi

      - name: "FIX 3: Clear stale DynamoDB state checksum"
        if: github.event.inputs.mode == 'destroy'
        run: |
          LOCK_KEY="$TF_STATE_KEY-md5"
          ITEM=$(aws dynamodb get-item \
            --table-name "$TF_LOCK_TABLE" --region "$STATE_REGION" \
            --key "{\"LockID\": {\"S\": \"$LOCK_KEY\"}}" \
            --output json 2>/dev/null || echo "")
          if echo "$ITEM" | grep -q "Digest"; then
            echo "Stale checksum found — removing..."
            aws dynamodb update-item \
              --table-name "$TF_LOCK_TABLE" --region "$STATE_REGION" \
              --key "{\"LockID\": {\"S\": \"$LOCK_KEY\"}}" \
              --update-expression "REMOVE #d" \
              --expression-attribute-names "{\"#d\": \"Digest\"}"
            echo "DynamoDB checksum cleared."
          else
            echo "No stale checksum — skipping."
          fi

      - name: "FIX 4: Force unlock stale state lock"
        if: github.event.inputs.mode == 'destroy'
        run: |
          LOCK_KEY="${STATE_BUCKET}/${TF_STATE_KEY}"
          ITEM=$(aws dynamodb get-item \
            --table-name "$TF_LOCK_TABLE" --region "$STATE_REGION" \
            --key "{\"LockID\": {\"S\": \"$LOCK_KEY\"}}" \
            --output json 2>/dev/null || echo "")
          if [ -n "$ITEM" ] && [ "$ITEM" != "{}" ]; then
            echo "Stale lock found — force unlocking..."
            aws dynamodb delete-item \
              --table-name "$TF_LOCK_TABLE" --region "$STATE_REGION" \
              --key "{\"LockID\": {\"S\": \"$LOCK_KEY\"}}"
            echo "State lock cleared."
          else
            echo "No stale lock — skipping."
          fi

      - name: "FIX 5: Pre-destroy VPC dependency cleanup"
        if: github.event.inputs.mode == 'destroy'
        run: |
          VAR_FILE="${{ github.event.inputs.environment }}.tfvars"
          CLUSTER=$(grep -E '^cluster_name\s*=' "$VAR_FILE" | sed -E 's/.*=\s*"([^"]+)".*/\1/')
          VPC_ID=$(aws ec2 describe-vpcs \
            --region "$STATE_REGION" \
            --filters "Name=tag:Name,Values=${CLUSTER}-vpc" \
            --query "Vpcs[0].VpcId" --output text 2>/dev/null)
          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "VPC not found — skipping pre-destroy cleanup."
            exit 0
          fi
          echo "Found VPC: $VPC_ID"
          # NAT Gateways
          NAT_IDS=$(aws ec2 describe-nat-gateways \
            --region "$STATE_REGION" \
            --filter "Name=vpc-id,Values=$VPC_ID" "Name=state,Values=available,pending" \
            --query "NatGateways[].NatGatewayId" --output text 2>/dev/null)
          for NAT in $NAT_IDS; do
            echo "Deleting NAT Gateway: $NAT"
            aws ec2 delete-nat-gateway --region "$STATE_REGION" --nat-gateway-id "$NAT"
          done
          for NAT in $NAT_IDS; do
            aws ec2 wait nat-gateway-deleted \
              --region "$STATE_REGION" --nat-gateway-ids "$NAT" 2>/dev/null || true
            echo "NAT Gateway deleted: $NAT"
          done
          # VPC Endpoints
          ENDPOINT_IDS=$(aws ec2 describe-vpc-endpoints \
            --region "$STATE_REGION" \
            --filters "Name=vpc-id,Values=$VPC_ID" "Name=vpc-endpoint-state,Values=available,pending" \
            --query "VpcEndpoints[].VpcEndpointId" --output text 2>/dev/null)
          if [ -n "$ENDPOINT_IDS" ]; then
            echo "Deleting VPC Endpoints: $ENDPOINT_IDS"
            aws ec2 delete-vpc-endpoints --region "$STATE_REGION" --vpc-endpoint-ids $ENDPOINT_IDS
          fi
          # Internet Gateway
          IGW_ID=$(aws ec2 describe-internet-gateways \
            --region "$STATE_REGION" \
            --filters "Name=attachment.vpc-id,Values=$VPC_ID" \
            --query "InternetGateways[0].InternetGatewayId" --output text 2>/dev/null)
          if [ -n "$IGW_ID" ] && [ "$IGW_ID" != "None" ]; then
            echo "Detaching and deleting IGW: $IGW_ID"
            aws ec2 detach-internet-gateway \
              --region "$STATE_REGION" --internet-gateway-id "$IGW_ID" --vpc-id "$VPC_ID"
            aws ec2 delete-internet-gateway \
              --region "$STATE_REGION" --internet-gateway-id "$IGW_ID"
          fi
          # EIPs
          EIP_ALLOC_IDS=$(aws ec2 describe-addresses \
            --region "$STATE_REGION" \
            --filters "Name=tag:Name,Values=${CLUSTER}-nat-eip" \
            --query "Addresses[].AllocationId" --output text 2>/dev/null)
          for EIP in $EIP_ALLOC_IDS; do
            echo "Releasing EIP: $EIP"
            aws ec2 release-address --region "$STATE_REGION" --allocation-id "$EIP" || true
          done
          echo "Pre-destroy VPC cleanup complete."

      # ── Terraform Init ──────────────────────────────────────────────────────

      - name: Terraform Init
        run: |
          RECONFIGURE=$( [ "${{ github.event.inputs.mode }}" = "destroy" ] && echo "-reconfigure" || echo "" )
          terraform init $RECONFIGURE -input=false \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      # Apply mode only: import backend resources so plan shows no unexpected changes
      - name: Import backend resources into state
        if: github.event.inputs.mode == 'apply'
        run: |
          VAR_FILE="${{ github.event.inputs.environment }}.tfvars"
          import_if_missing() {
            local addr="$1" id="$2"
            if terraform state list 2>/dev/null | grep -qxF "$addr"; then
              echo "Already in state: $addr"
            else
              echo "Importing: $addr (id=$id)"
              terraform import -input=false -var-file="$VAR_FILE" "$addr" "$id" || true
            fi
          }
          import_if_missing "aws_s3_bucket.terraform_state"                                      "$STATE_BUCKET"
          import_if_missing "aws_s3_bucket_versioning.terraform_state"                           "$STATE_BUCKET"
          import_if_missing "aws_s3_bucket_server_side_encryption_configuration.terraform_state" "$STATE_BUCKET"
          import_if_missing "aws_s3_bucket_public_access_block.terraform_state"                  "$STATE_BUCKET"
          import_if_missing "aws_dynamodb_table.terraform_lock"                                  "$TF_LOCK_TABLE"

      - name: Terraform Validate
        run: terraform validate

      # Destroy mode only: verify state is loaded before planning
      - name: Verify Terraform state
        if: github.event.inputs.mode == 'destroy'
        run: |
          RESOURCE_COUNT=$(terraform state list 2>/dev/null | wc -l | tr -d ' ')
          if [ "$RESOURCE_COUNT" -eq 0 ]; then
            echo "ERROR: Terraform state is empty — nothing to destroy."
            exit 1
          fi
          echo "State loaded — $RESOURCE_COUNT resources:"
          terraform state list

      # Destroy mode only: remove backend resources from state so terraform
      # does not try to delete the S3 bucket or DynamoDB table mid-destroy
      - name: "FIX 6: Remove backend resources from state"
        if: github.event.inputs.mode == 'destroy'
        run: |
          for ADDR in \
            aws_s3_bucket.terraform_state \
            aws_s3_bucket_versioning.terraform_state \
            aws_s3_bucket_server_side_encryption_configuration.terraform_state \
            aws_s3_bucket_public_access_block.terraform_state \
            aws_dynamodb_table.terraform_lock; do
            if terraform state list 2>/dev/null | grep -qxF "$ADDR"; then
              echo "Removing from state: $ADDR"
              terraform state rm -lock=false "$ADDR"
            else
              echo "Not in state (skipping): $ADDR"
            fi
          done

      - name: Terraform Plan
        run: |
          if [ "${{ github.event.inputs.mode }}" = "destroy" ]; then
            terraform plan -destroy \
              -var-file="${{ github.event.inputs.environment }}.tfvars" \
              -out=tfplan -input=false -no-color
          else
            terraform plan \
              -var-file="${{ github.event.inputs.environment }}.tfvars" \
              -out=tfplan -input=false
          fi

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: "tfplan-${{ github.event.inputs.environment }}-${{ github.event.inputs.mode }}"
          path: tfplan

  # ── Job 2: Preflight (apply mode only) ──────────────────────────────────────
  # Runs ROSA quota and permissions checks after plan so we know what will be
  # created before committing. If checks fail the approval gate never appears
  # and nothing gets applied. Skipped automatically for destroy mode.
  preflight:
    name: "Preflight [${{ github.event.inputs.environment }}]"
    needs: plan
    runs-on: ubuntu-latest
    if: github.event.inputs.mode == 'apply'

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      RHCS_TOKEN:            ${{ secrets.TF_VAR_RHCS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve region
        run: |
          VAR_FILE="${{ github.event.inputs.environment }}.tfvars"
          REGION=$(grep -E '^aws_region\s*=' "$VAR_FILE" | sed -E 's/.*=\s*"([^"]+)".*/\1/')
          REGION="${REGION:-${{ vars.AWS_DEFAULT_REGION || 'us-west-1' }}}"
          echo "STATE_REGION=$REGION" >> "$GITHUB_ENV"

      - name: Install ROSA CLI
        run: |
          curl -sLo rosa.tar.gz \
            https://mirror.openshift.com/pub/openshift-v4/clients/rosa/latest/rosa-linux.tar.gz
          tar -xzf rosa.tar.gz
          sudo mv rosa /usr/local/bin/
          rosa version

      - name: ROSA login
        run: rosa login --token="$RHCS_TOKEN"

      - name: Verify AWS quotas
        run: |
          echo "Running: rosa verify quota --region=$STATE_REGION"
          rosa verify quota --region="$STATE_REGION"

      - name: Verify IAM permissions
        run: |
          echo "Running: rosa verify permissions --region=$STATE_REGION"
          rosa verify permissions --region="$STATE_REGION"

  # ── Job 3: Execute (Apply or Destroy) ────────────────────────────────────────
  # Gated by GitHub Environment — "Review deployments" appears after preflight
  # passes (apply) or plan succeeds (destroy).
  # Approve to execute, dismiss to stop without changes.
  execute:
    name: "${{ github.event.inputs.mode == 'destroy' && 'Destroy' || 'Apply' }} [${{ github.event.inputs.environment }}]"
    needs: [plan, preflight]
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    # Run if plan succeeded AND (preflight passed OR preflight was skipped for destroy)
    if: |
      always() &&
      needs.plan.result == 'success' &&
      (needs.preflight.result == 'success' || needs.preflight.result == 'skipped')

    permissions:
      id-token: write
      contents: read
      actions: read

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      RHCS_TOKEN:            ${{ secrets.TF_VAR_RHCS_TOKEN }}
      TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE || 'rosa-terraform-lock' }}
      TF_STATE_KEY:  "rosa/${{ github.event.inputs.environment }}/terraform.tfstate"

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Resolve backend config
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          VAR_FILE="${{ github.event.inputs.environment }}.tfvars"
          REGION=$(grep -E '^aws_region\s*=' "$VAR_FILE" | sed -E 's/.*=\s*"([^"]+)".*/\1/')
          REGION="${REGION:-${{ vars.AWS_DEFAULT_REGION || 'us-west-1' }}}"
          BUCKET="rosa-terraform-state-${ACCOUNT_ID}"
          echo "STATE_BUCKET=$BUCKET" >> "$GITHUB_ENV"
          echo "STATE_REGION=$REGION" >> "$GITHUB_ENV"

      - name: Terraform Init
        run: |
          RECONFIGURE=$( [ "${{ github.event.inputs.mode }}" = "destroy" ] && echo "-reconfigure" || echo "" )
          terraform init $RECONFIGURE -input=false \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: "tfplan-${{ github.event.inputs.environment }}-${{ github.event.inputs.mode }}"

      # Executes both apply and destroy plans — terraform apply reads the plan
      # type from the artifact and acts accordingly.
      - name: Terraform Execute
        run: terraform apply -input=false tfplan
